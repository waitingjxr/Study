<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width= , initial-scale=1.0">
  <title>float</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      /* font-size: 0; */
    }
    ul li{
      list-style: none;
    }
    .items{
        overflow: hidden;
      /* float: left; */
    }
    .item{
      width: 100px;
      height: 50px;
      background-color: aqua;
      font-size: 20px;
      text-align: center;
      line-height: 50px;
      /* display: inline-block; */
      float: left;
    }
    .title{
      width: 100px;
      height: 50px;
      background-color: brown;
      text-align: center;
      line-height: 50px;
    }
    /* 伪类 */
    .clearfix::after{
      content: '';
      clear: left;
      display: table;
    }
  </style>
</head>
<body>
  <ul class="items">
    <li class="item">1</li>
    <li class="item">2</li>
    <li class="item">3</li>
    <li class="item">4</li>
    <li class="item">5</li>
    <div style="clear: left;" class="clearFix"></div>  
  </ul>
  <!-- <div style="clear: left;" class="clearFix"></div> -->
  <div class="title">6</div>
</body>
</html>
